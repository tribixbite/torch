<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#fbbf24;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#525252"/>
      <stop offset="50%" style="stop-color:#404040"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#f97316" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="420"/><line x1="40" y1="0" x2="40" y2="420"/>
    <line x1="80" y1="0" x2="80" y2="420"/><line x1="120" y1="0" x2="120" y2="420"/>
    <line x1="160" y1="0" x2="160" y2="420"/><line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/><line x1="280" y1="0" x2="280" y2="420"/>
    <line x1="320" y1="0" x2="320" y2="420"/><line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/><line x1="440" y1="0" x2="440" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/><line x1="520" y1="0" x2="520" y2="420"/>
    <line x1="560" y1="0" x2="560" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="640" y1="0" x2="640" y2="420"/><line x1="680" y1="0" x2="680" y2="420"/>
    <line x1="720" y1="0" x2="720" y2="420"/><line x1="760" y1="0" x2="760" y2="420"/>
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/><line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/><line x1="0" y1="400" x2="800" y2="400"/>
  </g>

  <!-- Flashlight beam (cone) -->
  <polygon points="280,210 650,80 650,340" fill="url(#beam)" opacity="0.6"/>

  <!-- Flashlight body -->
  <rect x="140" y="185" width="150" height="50" rx="8" fill="url(#body)" stroke="#555" stroke-width="1"/>
  <!-- Head -->
  <rect x="270" y="175" width="30" height="70" rx="4" fill="#4a4a4a" stroke="#555" stroke-width="1"/>
  <!-- Lens -->
  <circle cx="300" cy="210" r="25" fill="#1a1a1a" stroke="#f97316" stroke-width="2"/>
  <circle cx="300" cy="210" r="15" fill="#f97316" opacity="0.8" filter="url(#glow)"/>
  <circle cx="300" cy="210" r="8" fill="#fbbf24"/>
  <!-- Tail cap -->
  <rect x="130" y="192" width="15" height="36" rx="3" fill="#3a3a3a"/>
  <!-- Grip pattern -->
  <g stroke="#555" stroke-width="1" opacity="0.5">
    <line x1="170" y1="188" x2="170" y2="232"/>
    <line x1="180" y1="188" x2="180" y2="232"/>
    <line x1="190" y1="188" x2="190" y2="232"/>
    <line x1="200" y1="188" x2="200" y2="232"/>
    <line x1="210" y1="188" x2="210" y2="232"/>
  </g>

  <!-- Code/search brackets in beam -->
  <g transform="translate(420, 170)" opacity="0.7" filter="url(#glow)">
    <text font-family="monospace" font-size="60" fill="#f97316" font-weight="bold">{</text>
  </g>
  <g transform="translate(560, 170)" opacity="0.7" filter="url(#glow)">
    <text font-family="monospace" font-size="60" fill="#f97316" font-weight="bold">}</text>
  </g>
  <!-- Search magnifier in center of beam -->
  <g transform="translate(495, 190)" opacity="0.6">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <line x1="13" y1="13" x2="24" y2="24" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Title text -->
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="#f97316" letter-spacing="2">TORCH</text>
  <text x="400" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a3a3a3" letter-spacing="4">FLASHLIGHT SEARCH ENGINE</text>

  <!-- Border accent -->
  <rect x="0" y="0" width="800" height="3" fill="#f97316" opacity="0.8"/>
  <rect x="0" y="417" width="800" height="3" fill="#f97316" opacity="0.4"/>
</svg>
