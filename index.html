<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />

		<meta name="theme-color" content="#0a0a0a" />

		<!-- Primary Meta Tags -->
		<title>Torch — Flashlight Search Engine</title>

		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://react.torch.directory/" />
		<meta property="og:title" content="Torch — Flashlight Search Engine" />

		<meta name="twitter:card" content="summary_large_image" />

		<link rel="apple-touch-icon" href="/favicon-192.png" />
		<link rel="manifest" href="/manifest.json" />

		<link rel="canonical" href="https://react.torch.directory/" />
