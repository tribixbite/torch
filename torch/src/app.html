<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="color-scheme" content="dark light" />

		<!-- Primary Meta Tags -->
		<title>Torch — Flashlight Search Engine</title>
		<meta name="title" content="Torch — Flashlight Search Engine" />
		<meta name="description" content="Search, filter, and compare 3,177 flashlights by brand, lumens, runtime, battery, price, and 28 other specs. The modern parametrek reimagination." />
		<meta name="keywords" content="flashlight, search, parametrek, torch, LED, lumens, compare, filter, EDC, tactical, headlamp" />
		<meta name="author" content="tribixbite" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://torch.directory/" />
		<meta property="og:title" content="Torch — Flashlight Search Engine" />
		<meta property="og:description" content="Search, filter, and compare 3,177 flashlights by brand, lumens, runtime, battery, price, and 28 other specs." />
		<meta property="og:image" content="https://torch.directory/og-preview.gif" />
		<meta property="og:image:type" content="image/gif" />
		<meta property="og:image:width" content="800" />
		<meta property="og:image:height" content="420" />
		<meta property="og:site_name" content="Torch" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://torch.directory/" />
		<meta name="twitter:title" content="Torch — Flashlight Search Engine" />
		<meta name="twitter:description" content="Search, filter, and compare 3,177 flashlights. 28 filterable specs, real-time results." />
		<meta name="twitter:image" content="https://torch.directory/og-preview.gif" />

		<!-- Icons & Manifest -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />

		<!-- Canonical -->
		<link rel="canonical" href="https://torch.directory/" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
